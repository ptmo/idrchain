<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Halaman Tidak Ditemukan | IDR Chain</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --bg-dark: #090d16;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* --- PERBAIKAN LAYOUT --- */
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Mengelompokkan semua konten di tengah vertikal */
            gap: 4rem; /* Memberikan jarak pasti 4rem antara Header, Main, dan Footer */
            overflow-x: hidden;
            padding: 2.5rem 2rem;
            position: relative;
        }

        .ambient-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(139, 92, 246, 0.08) 40%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            z-index: 10;
            /* margin-bottom: auto dihapus agar tidak saling menjauh */
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .logo span {
            color: var(--secondary);
        }

        /* --- Main Content Card --- */
        .error-container {
            max-width: 580px;
            text-align: center;
            z-index: 10;
            /* margin: auto 0 dihapus agar terikat oleh properti gap pada body */
        }

        .reveal {
            opacity: 0;
            transform: translateY(25px);
            animation: softReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes softReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 7.5rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 30%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -4px;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .error-divider {
            width: 40px;
            height: 3px;
            background: var(--secondary);
            margin: 1.5rem auto;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #FF3333;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        /* --- Container Ikon Radar --- */
        .radar-icon-wrapper {
            position: relative;
            width: 85px;
            height: 85px; 
            background-color: #eff6ff; 
            border-radius: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem auto 1.5rem auto; 
            z-index: 1;
        }

        .radar-icon-wrapper img {
            width: 45px; 
            height: 45px;
            object-fit: contain;
        }

        .radar-icon-wrapper::before,
        .radar-icon-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background-color: rgba(59, 130, 246, 0.3);
            z-index: -1;
            pointer-events: none;
            animation: googleRadarPulse 2.5s cubic-bezier(0.25, 0, 0, 1) infinite;
        }

        .radar-icon-wrapper::after {
            animation-delay: 1.25s;
        }

        @keyframes googleRadarPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.4); opacity: 0; }
        }

        /* --- Action Buttons --- */
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 0.85rem 1.8rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-primary {
            background-color: var(--secondary);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
        }

        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-outline {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-3px);
        }

        footer {
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 0.85rem;
            color: #475569;
            /* margin-top: auto dihapus */
        }

        /* --- Responsive Mode Mobile --- */
        @media (max-width: 768px) {
            body { 
                padding: 1.5rem; 
                justify-content: flex-start; /* Untuk layar kecil biarkan konten mengalir ke bawah */
                gap: 2rem;
            }
            .error-code { font-size: 5.5rem; letter-spacing: -2px; }
            h1 { font-size: 1.4rem; }
            p { font-size: 0.95rem; margin-bottom: 2.5rem; }
            .button-group { flex-direction: column; width: 100%; gap: 0.8rem; }
            .btn { width: 100%; justify-content: center; padding: 0.8rem 1.5rem; }
            .ambient-bg { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <header class="reveal">
        <a href="index" class="logo">IDR<span>Chain</span></a>
    </header>

    <main class="error-container reveal" style="animation-delay: 150ms;">
        <div class="error-code">404</div>
        <h1>Halaman Tidak Ditemukan</h1>
        <div class="error-divider"></div>
        
        <div class="radar-icon-wrapper">
            <img src="img/radar.svg" alt="Radar Ikon">
        </div>

        <p>Maaf, tautan yang Anda tuju tidak tersedia, atau salah. Pastikan alamat URL benar.</p>
        
        <div class="button-group">
            <a href="index" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i> Kembali ke Beranda
            </a>
            <a href="IDR_Chain_Whitepaper.pdf" target="_blank" class="btn btn-outline">
                <i class="fas fa-file-pdf"></i> Buka Whitepaper
            </a>
        </div>
    </main>

    <footer class="reveal" style="animation-delay: 300ms;">
    IDR Chain Jaringan Ledger Terdistribusi Nasional &copy; <span id="waktu-realtime"></span>. Seluruh Hak Cipta Dilindungi.
    </footer>
<script>
    function updateWaktuFooter() {
        const waktu = new Date();
        
        // Array nama hari dan bulan
        const daftarHari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const daftarBulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        
        const namaHari = daftarHari[waktu.getDay()];
        const tanggal = waktu.getDate();
        const namaBulan = daftarBulan[waktu.getMonth()];
        const tahun = waktu.getFullYear();
        
        // Memastikan jam, menit, dan detik selalu 2 digit (contoh: 09:05:03)
        const jam = String(waktu.getHours()).padStart(2, '0');
        const menit = String(waktu.getMinutes()).padStart(2, '0');
        const detik = String(waktu.getSeconds()).padStart(2, '0');
        
        // Menyusun format: Hari Tanggal(Bulan) Jam:Menit:Detik Tahun
        const formatTeks = `${namaHari} ${tanggal} ${namaBulan} ${jam}:${menit}:${detik} ${tahun}`;
        
        // Memasukkan teks ke dalam span
        const elemenSpan = document.getElementById('waktu-realtime');
        if (elemenSpan) {
            elemenSpan.innerHTML = formatTeks;
        }
    }

    // Jalankan fungsi pertama kali
    updateWaktuFooter();
    
    // Perbarui setiap 1000 milidetik (1 detik)
    setInterval(updateWaktuFooter, 1000);
</script>
</body>
</html>
